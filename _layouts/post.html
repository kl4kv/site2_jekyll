---
layout: default
---
<a href="{{ '/' | relative_url }}" class="post-back">← Ко всем постам</a>

<article class="post-article">

  <img src="{{ page.image | relative_url }}" alt="Фото к посту «{{ page.title }}»" class="post-image">

  <h1>{{ page.title }}</h1>
  <time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: '%-d %B %Y' }}</time>

  {{ content }}

</article>
